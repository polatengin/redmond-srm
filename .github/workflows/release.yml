name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          latest_tag=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            new_tag="v0.1.0"
          else
            # Increment patch version
            major=$(echo "$latest_tag" | sed 's/^v//' | cut -d. -f1)
            minor=$(echo "$latest_tag" | sed 's/^v//' | cut -d. -f2)
            patch=$(echo "$latest_tag" | sed 's/^v//' | cut -d. -f3)
            patch=$((patch + 1))
            new_tag="v${major}.${minor}.${patch}"
          fi
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.get_tag.outputs.new_tag }}"
          git push origin "${{ steps.get_tag.outputs.new_tag }}"

      - name: Create release
        id: create_release
        uses: actions/github-script@v8
        with:
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.get_tag.outputs.new_tag }}',
              name: '${{ steps.get_tag.outputs.new_tag }}',
              generate_release_notes: true
            });
            core.setOutput('release_url', release.data.html_url);

      - name: Trigger sync pipeline in polatengin/redmond
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'polatengin',
              repo: 'redmond',
              workflow_id: 'sync.yml',
              ref: 'main',
              inputs: {
                release_tag: '${{ steps.get_tag.outputs.new_tag }}',
                release_url: '${{ steps.create_release.outputs.release_url }}'
              }
            })
